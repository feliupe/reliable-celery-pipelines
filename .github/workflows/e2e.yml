name: e2e

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  run-all-fms:
    name: run_all_fms.py
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run all FMs end-to-end
        # run_all_fms.py brings up the docker compose stack itself if the
        # broker/backend ports aren't already open.
        run: uv run python run_all_fms.py

      - name: Upload run logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fm-run-logs
          path: .fm_run_logs/
          if-no-files-found: ignore
